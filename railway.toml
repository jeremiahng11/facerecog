[build]
builder = "NIXPACKS"

[build.nixpacksPlan.phases.setup]
# Install system libraries required by dlib (face_recognition dependency)
nixPkgs = [
  "cmake",
  "gcc",
  "openblas",
  "lapack",
  "libX11",
  "python311",
  "python311Packages.pip",
]

[deploy]
startCommand = "gunicorn faceid.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
healthcheckPath = "/login/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
