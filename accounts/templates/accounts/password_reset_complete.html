{% extends 'base.html' %}
{% block title %}Password Reset Complete — FaceID Portal{% endblock %}
{% block content %}
<div class="page" style="max-width:460px;margin:60px auto">
  <div class="card" style="text-align:center;padding:40px 28px">
    <svg width="48" height="48" fill="none" stroke="var(--accent3)" stroke-width="1.5" viewBox="0 0 24 24" style="margin-bottom:16px">
      <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
      <polyline points="22 4 12 14.01 9 11.01"/>
    </svg>
    <h2 style="margin-bottom:8px">Password Reset Complete</h2>
    <p style="color:var(--text2);font-size:14px;margin-bottom:20px">
      Your password has been set. You can now log in with your new password.
    </p>
    <a href="{% url 'login' %}" class="btn btn-primary">Sign In</a>
  </div>
</div>
{% endblock %}
