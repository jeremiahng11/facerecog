<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Print Queue Ticket</title>
<style>
  /* 58mm thermal printer: ~48mm printable width ≈ 384px at 203dpi */
  @page { size: 58mm auto; margin: 0; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 48mm;
    font-family: 'Courier New', monospace;
    color: #000;
    background: #fff;
    padding: 3mm 2mm;
    text-align: center;
  }
  .brand { font-size: 10pt; font-weight: bold; margin-bottom: 2mm; }
  .divider { border-top: 1px dashed #000; margin: 2mm 0; }
  .staff-name { font-size: 9pt; margin-bottom: 1mm; }
  .queue-num {
    font-size: 36pt; font-weight: bold; letter-spacing: 2mm;
    margin: 3mm 0;
  }
  .qr-code { margin: 2mm auto; }
  .qr-code img { width: 30mm; height: 30mm; }
  .timestamp { font-size: 7pt; color: #333; margin-top: 1mm; }
  .footer { font-size: 7pt; color: #666; margin-top: 2mm; }

  @media screen {
    body {
      width: 300px; margin: 40px auto;
      border: 1px solid #ccc; padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .no-print { display: block; margin: 20px auto; }
  }
  @media print { .no-print { display: none; } }
</style>
</head>
<body>
  <div class="brand">{{ brand_name|default:"FaceID Portal" }}</div>
  <div class="divider"></div>

  <div class="staff-name">{{ ticket.user.display_name }}</div>

  <div class="queue-num">Q{{ ticket.number|stringformat:"03d" }}</div>

  <div class="qr-code">
    {% if qr_data %}
    <img src="{{ qr_data }}" alt="QR">
    {% endif %}
  </div>

  <div class="timestamp">
    {{ ticket.created_at|date:"d M Y" }}<br>
    {{ ticket.created_at|date:"H:i:s" }}
  </div>

  <div class="divider"></div>
  <div class="footer">Thank you for waiting</div>

  <button class="no-print" onclick="window.print()" style="
    padding:10px 24px; font-size:14px; cursor:pointer;
    background:#00d4ff; color:#000; border:none; border-radius:8px;
    font-weight:600; margin-top:16px;
  ">Print Ticket</button>
</body>
</html>
