{% extends 'base.html' %}
{% block title %}{% if item %}Edit{% else %}Add{% endif %} Menu Item{% endblock %}
{% block content %}
<div class="page" style="max-width:700px">
  <div style="margin-bottom:20px">
    <a href="{% url 'cafeteria_admin_menu_list' %}" class="btn btn-secondary btn-sm">← Back</a>
    <div class="page-title" style="margin-top:8px">{% if item %}Edit{% else %}Add{% endif %} Menu Item</div>
  </div>

  <form method="post" enctype="multipart/form-data" class="card">
    {% csrf_token %}

    <div class="form-group">
      <label>Name</label>
      <input type="text" name="name" value="{{ item.name|default:'' }}" required>
    </div>
    <div class="form-group">
      <label>Description</label>
      <input type="text" name="description" value="{{ item.description|default:'' }}">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Menu Type</label>
        <select name="menu_type">
          <option value="halal" {% if item.menu_type == 'halal' %}selected{% endif %}>Halal Kitchen</option>
          <option value="non_halal" {% if item.menu_type == 'non_halal' %}selected{% endif %}>Non-Halal Kitchen</option>
          <option value="cafe_bar" {% if item.menu_type == 'cafe_bar' %}selected{% endif %}>Cafe Bar</option>
        </select>
      </div>
      <div class="form-group">
        <label>Category</label>
        <input type="text" name="category" value="{{ item.category|default:'' }}" placeholder="e.g. Rice Meals">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Staff Price (SGD)</label>
        <input type="number" step="0.01" name="staff_price" value="{{ item.staff_price|default:'' }}" required>
      </div>
      <div class="form-group">
        <label>Public Price (SGD)</label>
        <input type="number" step="0.01" name="public_price" value="{{ item.public_price|default:'' }}" required>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Daily Quantity</label>
        <input type="number" name="daily_quantity" value="{{ item.daily_quantity|default:0 }}">
      </div>
      <div class="form-group">
        <label>Low Stock Alert</label>
        <input type="number" name="low_stock_threshold" value="{{ item.low_stock_threshold|default:3 }}">
      </div>
    </div>
    <div class="form-group">
      <label>Display Order</label>
      <input type="number" name="display_order" value="{{ item.display_order|default:0 }}">
    </div>
    <div class="form-group">
      <label>Photo</label>
      {% if item.photo %}<img src="{{ item.photo.url }}" style="width:80px;height:80px;border-radius:8px;object-fit:cover;margin-bottom:8px">{% endif %}
      <input type="file" name="photo" accept="image/*">
    </div>
    <div class="form-group">
      <div class="form-check">
        <input type="checkbox" name="is_available" id="is_avail" {% if item.is_available or not item %}checked{% endif %}>
        <label for="is_avail">Available (visible on kiosk)</label>
      </div>
    </div>

    <button type="submit" class="btn btn-primary btn-full">
      {% if item %}Save Changes{% else %}Add Menu Item{% endif %}
    </button>
  </form>
</div>
{% endblock %}
