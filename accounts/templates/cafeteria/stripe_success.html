{% extends 'cafeteria/_base_cafeteria.html' %}
{% block title %}Payment Confirmed{% endblock %}
{% block content %}
<div style="max-width:480px;margin:60px auto;text-align:center;padding:20px">
  <div style="font-size:64px">✅</div>
  <h1 style="font-size:28px;font-weight:800;color:var(--success);margin:10px 0">Payment Confirmed</h1>
  <p style="color:var(--text2)">Your order has been placed. Check the queue TV for your number.</p>
  <button class="btn btn-primary" onclick="window.location='/cafeteria/kiosk/'" style="margin-top:20px">Back to Home</button>
</div>
{% endblock %}
